<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <line class="mute-line" x1="23" y1="9" x2="17" y2="15" style="display:none"></line>
          <line class="mute-line" x1="17" y1="9" x2="23" y2="15" style="display:none"></line>
          <path class="sound-wave" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          <path class="sound-wave" d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
      </div>
      <h1>Ad Muter</h1>
    </div>

    <p class="subtitle">Auto-mute ads during live matches</p>

    <div class="toggle-row">
      <span class="label" id="statusLabel">Enabled</span>
      <label class="switch">
        <input type="checkbox" id="toggle" checked />
        <span class="slider"></span>
      </label>
    </div>

    <div class="status-card" id="statusCard">
      <div class="status-dot active" id="statusDot"></div>
      <span id="statusText">Monitoring for ads...</span>
    </div>

    <div class="platforms">
      <p class="section-title">Supported Platforms</p>
      <div class="chips">
        <span class="chip">JioCinema</span>
        <span class="chip">Hotstar</span>
        <span class="chip">YouTube</span>
        <span class="chip">SonyLIV</span>
        <span class="chip">FanCode</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
